<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Trở Thành Chủ Xe - Thuê Xe Trực Tuyến</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .form-label {
            font-weight: 600;
        }
        .upload-area {
            border: 2px dashed #6c757d;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
        }
        .upload-area:hover {
            border-color: #0d6efd;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0"><i class="fas fa-car"></i> ĐĂNG KÝ TRỞ THÀNH CHỦ XE</h4>
                </div>
                <div class="card-body p-5">

                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/owner/dang-ky-chu-xe}" method="post" enctype="multipart/form-data" th:object="${dangKyRequest}">

                        <!-- Thông tin cá nhân (readonly) -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" class="form-control" th:value="${user.hoTen}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" class="form-control" th:value="${user.soDienThoai}" readonly>
                            </div>
                        </div>

                        <!-- CCCD -->
                        <div class="mb-4">
                            <label class="form-label">Số CCCD / CMND <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{soCCCD}" placeholder="012345678901" required>
                        </div>

                        <!-- Ảnh CCCD -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Ảnh CCCD mặt trước <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" name="anhCCCDMatTruoc" accept="image/*" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Ảnh CCCD mặt sau <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" name="anhCCCDMatSau" accept="image/*" required>
                            </div>
                        </div>

                        <!-- GPLX -->
                        <div class="mb-4">
                            <label class="form-label">Số Giấy Phép Lái Xe <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{soGPLX}" placeholder="B2-123456" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Ảnh Giấy Phép Lái Xe <span class="text-danger">*</span></label>
                            <input type="file" class="form-control" name="anhGPLX" accept="image/*" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-paper-plane"></i> Gửi Đơn Đăng Ký
                            </button>
                            <a th:href="@{/}" class="btn btn-secondary">Quay lại Trang chủ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
