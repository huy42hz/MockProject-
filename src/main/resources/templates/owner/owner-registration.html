<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Làm Chủ Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4>Đăng Ký Trở Thành Chủ Xe</h4>
                </div>
                <div class="card-body p-5">

                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/owner/dang-ky-chu-xe}" method="post" 
                          enctype="multipart/form-data" th:object="${ownerRegistrationRequest}">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label>Họ tên</label>
                                <input type="text" class="form-control" th:value="${user != null ? user.fullName : ''}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label>Số điện thoại</label>
                                <input type="text" class="form-control" th:value="${user != null ? user.phone : ''}" readonly>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số CCCD <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{nationalId}" required>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label>Ảnh CCCD mặt trước <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" name="nationalIdFrontImage" accept="image/*" required>
                            </div>
                            <div class="col-md-6">
                                <label>Ảnh CCCD mặt sau <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" name="nationalIdBackImage" accept="image/*" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Gửi Đơn Đăng Ký</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
