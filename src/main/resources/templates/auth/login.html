<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Thuê Xe Trực Tuyến</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
        }
        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1 class="display-4 text-primary mb-2">🚗</h1>
                            <h3 class="fw-bold">Thuê Xe Trực Tuyến</h3>
                            <p class="text-muted">Đăng nhập để tiếp tục</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${param.logout}" class="alert alert-info">Bạn đã đăng xuất thành công!</div>

                        <form th:action="@{/auth/login}" method="post" th:object="${loginRequest}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Số điện thoại <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" th:field="*{soDienThoai}" 
                                       placeholder="0912345678" required autofocus>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" th:field="*{matKhau}" 
                                       placeholder="Nhập mật khẩu" required>
                            </div>

                            <button type="submit" class="btn btn-primary btn-login w-100 mb-3">
                                <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <p>Chưa có tài khoản? 
                                <a th:href="@{/auth/register}" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                            </p>
                            <p><a th:href="@{/auth/forgot-password}"
   class="text-muted small">

    Quên mật khẩu?
</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
