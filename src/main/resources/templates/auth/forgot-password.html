<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            align-items:center;
        }

        .card{
            border-radius:20px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h3 class="text-center mb-4">
                        Quên mật khẩu
                    </h3>

                    <div th:if="${error}"
                         class="alert alert-danger"
                         th:text="${error}">
                    </div>

                    <div th:if="${success}"
                         class="alert alert-success"
                         th:text="${success}">
                    </div>

                    <form th:action="@{/auth/forgot-password}"
                          method="post"
                          th:object="${forgotRequest}">

                        <!-- EMAIL -->
                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}">
                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">

                            <label class="form-label">
                                Mật khẩu mới
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{newPassword}">
                        </div>

                        <!-- CONFIRM -->
                        <div class="mb-4">

                            <label class="form-label">
                                Xác nhận mật khẩu
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{confirmPassword}">
                        </div>

                        <button class="btn btn-primary w-100">

                            Đổi mật khẩu
                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a th:href="@{/auth/login}">
                            Quay lại đăng nhập
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
